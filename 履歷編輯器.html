<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>專業多語系履歷編輯器</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-dark: #1a2a3a;
            --accent-color: #c0392b;
            --border-color: #d1d5db;
            --bg-editor: #f3f4f6;
            --text-main: #374151;
            --text-light: #6b7280;
        }

        body { font-family: 'Noto Sans TC', sans-serif; background: var(--bg-editor); margin: 0; padding: 20px; color: var(--text-main); display: flex; justify-content: center; }

        /* 編輯區 */
        .editor-panel { width: 500px; background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); margin-right: 20px; height: 95vh; overflow-y: auto; }
        .control-group { background: #f9fafb; padding: 15px; border-radius: 6px; margin-bottom: 20px; border: 1px solid #eee; }
        h3 { font-size: 16px; text-transform: uppercase; color: var(--primary-dark); border-bottom: 2px solid #eee; padding-bottom: 8px; margin-top: 25px; }
        .input-item { margin-bottom: 12px; }
        label { display: block; font-size: 13px; font-weight: 500; margin-bottom: 4px; color: var(--text-light); }
        input, select, textarea { width: 100%; padding: 10px; border: 1px solid var(--border-color); border-radius: 4px; font-size: 14px; box-sizing: border-box; }
        
        .checkbox-group { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; font-size: 14px; }
        .checkbox-group input { width: auto; cursor: pointer; }

        input[type="color"] { appearance: none; -webkit-appearance: none; border: 1px solid var(--border-color); width: 100%; height: 45px; cursor: pointer; background: none; padding: 2px; border-radius: 4px; }
        .btn { cursor: pointer; border: none; border-radius: 4px; font-weight: bold; transition: 0.2s; }
        .btn-add { background: #e5e7eb; color: #374151; padding: 8px 12px; font-size: 12px; margin-top: 5px; }
        .btn-print { background: var(--primary-dark); color: white; width: 100%; padding: 15px; font-size: 16px; margin-top: 30px; }

        /* 預覽區 A4 */
        .preview-page { width: 210mm; min-height: 297mm; background: white; padding: 20mm; box-shadow: 0 0 20px rgba(0,0,0,0.1); box-sizing: border-box; position: sticky; top: 20px; overflow-y: auto; height: 95vh; }

        /* 標題與照片佈局 */
        .resume-header { border-bottom: 3px solid var(--primary-dark); padding-bottom: 15px; margin-bottom: 25px; display: flex; justify-content: space-between; align-items: flex-start; }
        .header-text { flex: 1; }
        .resume-name { font-size: 28px; font-weight: 700; color: var(--primary-dark); margin: 0; letter-spacing: 1px; }
        .resume-title { font-size: 18px; color: var(--text-light); margin: 5px 0; font-weight: 400; }
        .resume-contact { font-size: 13px; color: var(--text-light); display: flex; gap: 15px; margin-top: 10px; }

        .photo-container { width: 100px; height: 125px; border: 1px solid #eee; background: #f9fafb; display: flex; align-items: center; justify-content: center; overflow: hidden; border-radius: 4px; margin-left: 20px; }
        .photo-container img { width: 100%; height: 100%; object-fit: cover; }
        .hidden { display: none !important; }

        /* 內容區塊 */
        .section-header { font-size: 16px; font-weight: 700; color: var(--primary-dark); background: #f3f4f6; padding: 6px 12px; margin: 25px 0 15px; text-transform: uppercase; letter-spacing: 1px; }
        .content-card { padding: 10px 12px; border-radius: 4px; border-left: 3px solid transparent; transition: 0.3s; cursor: pointer; margin-bottom: 10px; }
        .content-card:hover { background: #f9fafb; }
        .content-card.selected { border-left-color: var(--accent-color); background: #fff5f5; }
        .card-row { display: flex; justify-content: space-between; align-items: baseline; }
        .main-info { font-size: 15px; font-weight: 700; color: #111827; }
        .date-info { font-size: 13px; color: var(--text-light); }
        .sub-info { font-size: 14px; color: var(--accent-color); font-weight: 500; margin: 3px 0; }
        .desc-info { font-size: 13px; color: var(--text-main); line-height: 1.6; white-space: pre-line; margin-top: 8px; }

        .skill-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .skill-item { margin-bottom: 10px; }
        .skill-label { display: flex; justify-content: space-between; font-size: 13px; }
        .progress-bg { background: #e5e7eb; height: 6px; border-radius: 3px; overflow: hidden; }
        .progress-fill { background: var(--primary-dark); height: 100%; }

        @media print {
            .editor-panel { display: none !important; }
            .preview-page { width: 100%; box-shadow: none; padding: 0; margin: 0; position: static; height: auto; }
            .content-card.selected { background: #fff5f5 !important; -webkit-print-color-adjust: exact; }
        }
    </style>
</head>
<body>

<div class="editor-panel">
    <div class="control-group">
        <label>履歷顯示設定</label>
        
        <div class="checkbox-group">
            <input type="checkbox" id="langToggle" onchange="updateLanguage(this.checked)">
            <label for="langToggle">使用英文版界面 (English Version)</label>
        </div>

        <div class="checkbox-group">
            <input type="checkbox" id="toggleSalary" checked onchange="toggleVisibility('preSalaryWrapper', this.checked)">
            <label for="toggleSalary">顯示期待年薪</label>
        </div>

        <div class="checkbox-group">
            <input type="checkbox" id="togglePhoto" checked onchange="toggleVisibility('photoBox', this.checked)">
            <label for="togglePhoto">顯示大頭照</label>
        </div>

        <div class="input-item">
            <label>自定義強調色</label>
            <input type="color" id="themeColor" value="#c0392b" oninput="updateThemeColor(this.value)">
        </div>

        <div class="input-item">
            <label>上傳照片</label>
            <input type="file" accept="image/*" onchange="handlePhotoUpload(this)">
        </div>
    </div>

    <h3 id="labelPersonal">個人資訊</h3>
    <div class="input-item"><label id="labelName">姓名</label><input type="text" placeholder="Alex Chen" oninput="sync('preName', this.value)"></div>
    <div class="input-item"><label id="labelJob">專業稱謂</label><input type="text" placeholder="Java 後端工程師" oninput="sync('preTitle', this.value)"></div>
    <div class="input-item"><label>Email</label><input type="text" oninput="sync('preEmail', this.value)" placeholder="alex.chen@example.com"></div>
    <div class="input-item"><label id="labelSalaryIn">期待年薪</label><input type="number" oninput="updateSalary(this.value)" placeholder="800000"></div>

    <h3 id="labelEduTitle">教育背景</h3>
    <div id="eduEditorList"></div>
    <button class="btn btn-add" onclick="addEdu()">+ Add Education</button>

    <h3 id="labelExpTitle">工作經歷</h3>
    <div id="expEditorList"></div>
    <button class="btn btn-add" onclick="addExp()">+ Add Experience</button>

    <h3 id="labelSkillTitle">專業技能</h3>
    <div id="skillEditorList"></div>
    <button class="btn btn-add" onclick="addSkill()">+ Add Skill</button>

    <button class="btn btn-print" id="btnPrint" onclick="window.print()">下載/列印 PDF 履歷</button>
</div>

<div class="preview-page">
    <div class="resume-header">
        <div class="header-text">
            <h1 id="preName" class="resume-name">ALEX CHEN</h1>
            <p id="preTitle" class="resume-title">Java 後端工程師</p>
            <div class="resume-contact">
                <span id="preEmail">alex.chen@example.com</span>
                <span id="preSalaryWrapper">
                    <span>|</span>
                    <span id="textSalaryLabel">期待年薪:</span> <span id="preSalary">800,000</span> TWD
                </span>
            </div>
        </div>
        <div id="photoBox" class="photo-container">
            <img id="prePhoto" src="" alt="Photo" class="hidden">
            <span id="photoPlaceholder" style="font-size: 10px; color: #ccc;">PHOTO</span>
        </div>
    </div>

    <div class="section-header" id="preEduHeader">教育背景</div>
    <div id="preEdu"></div>

    <div class="section-header" id="preExpHeader">工作經歷</div>
    <div id="preExp"></div>

    <div class="section-header" id="preSkillHeader">專業技能</div>
    <div id="preSkills" class="skill-grid"></div>
</div>

<script>
    // 語系字典
    const i18n = {
        zh: {
            personal: "個人資訊", name: "姓名", job: "專業稱謂", salaryIn: "期待年薪",
            edu: "教育背景", exp: "工作經歷", skill: "專業技能",
            salaryPre: "期待年薪:", print: "下載/列印 PDF 履歷"
        },
        en: {
            personal: "Personal Info", name: "Full Name", job: "Job Title", salaryIn: "Expected Salary",
            edu: "Education", exp: "Work Experience", skill: "Professional Skills",
            salaryPre: "Expected Salary:", print: "Download / Print PDF"
        }
    };

    function updateLanguage(isEnglish) {
        const lang = isEnglish ? i18n.en : i18n.zh;
        document.getElementById('labelPersonal').innerText = lang.personal;
        document.getElementById('labelName').innerText = lang.name;
        document.getElementById('labelJob').innerText = lang.job;
        document.getElementById('labelSalaryIn').innerText = lang.salaryIn;
        document.getElementById('labelEduTitle').innerText = lang.edu;
        document.getElementById('labelExpTitle').innerText = lang.exp;
        document.getElementById('labelSkillTitle').innerText = lang.skill;
        document.getElementById('btnPrint').innerText = lang.print;

        // 預覽區標題
        document.getElementById('textSalaryLabel').innerText = lang.salaryPre;
        document.getElementById('preEduHeader').innerText = lang.edu;
        document.getElementById('preExpHeader').innerText = lang.exp;
        document.getElementById('preSkillHeader').innerText = lang.skill;
    }

    // 基礎邏輯
    function sync(id, val) { document.getElementById(id).innerText = val || '(未填寫)'; }
    function updateSalary(val) { document.getElementById('preSalary').innerText = val ? Number(val).toLocaleString() : '---'; }
    function updateThemeColor(color) { document.documentElement.style.setProperty('--accent-color', color); }
    
    function toggleVisibility(id, show) {
        const el = document.getElementById(id);
        if (show) el.classList.remove('hidden');
        else el.classList.add('hidden');
    }

    function handlePhotoUpload(input) {
        const file = input.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = (e) => {
                const img = document.getElementById('prePhoto');
                img.src = e.target.result;
                img.classList.remove('hidden');
                document.getElementById('photoPlaceholder').classList.add('hidden');
            };
            reader.readAsDataURL(file);
        }
    }

    // 教育經歷、工作經歷、技能 (延用前版本逻辑)
    function addEdu() {
        const div = document.createElement('div');
        div.className = 'control-group';
        div.innerHTML = `<input type="text" class="ed-school" placeholder="School" oninput="updateEdu()"><input type="text" class="ed-major" placeholder="Major" oninput="updateEdu()"><input type="text" class="ed-date" placeholder="Date" oninput="updateEdu()">`;
        document.getElementById('eduEditorList').appendChild(div);
    }
    function updateEdu() {
        const schools = document.querySelectorAll('.ed-school'), majors = document.querySelectorAll('.ed-major'), dates = document.querySelectorAll('.ed-date');
        let html = '';
        schools.forEach((s, i) => {
            html += `<div class="content-card" onclick="this.classList.toggle('selected')">
                <div class="card-row"><div class="main-info">${s.value || 'School'}</div><div class="date-info">${dates[i].value || 'Date'}</div></div>
                <div class="sub-info">${majors[i].value || 'Degree'}</div></div>`;
        });
        document.getElementById('preEdu').innerHTML = html;
    }

    function addExp() {
        const div = document.createElement('div');
        div.className = 'control-group';
        div.innerHTML = `<input type="text" class="ex-comp" placeholder="Company" oninput="updateExp()"><input type="text" class="ex-pos" placeholder="Position" oninput="updateExp()"><textarea class="ex-desc" rows="3" placeholder="Achievements" oninput="updateExp()"></textarea>`;
        document.getElementById('expEditorList').appendChild(div);
    }
    function updateExp() {
        const comps = document.querySelectorAll('.ex-comp'), pos = document.querySelectorAll('.ex-pos'), descs = document.querySelectorAll('.ex-desc');
        let html = '';
        comps.forEach((c, i) => {
            html += `<div class="content-card" onclick="this.classList.toggle('selected')">
                <div class="card-row"><div class="main-info">${c.value || 'Company'}</div></div>
                <div class="sub-info">${pos[i].value || 'Position'}</div><div class="desc-info">${descs[i].value || ''}</div></div>`;
        });
        document.getElementById('preExp').innerHTML = html;
    }

    function addSkill() {
        const div = document.createElement('div');
        div.className = 'input-item'; div.style.display = "flex"; div.style.gap = "10px";
        div.innerHTML = `<input type="text" class="sk-name" oninput="updateSkills()" style="flex:2;"> <input type="range" class="sk-val" min="0" max="100" oninput="updateSkills()" style="flex:1;">`;
        document.getElementById('skillEditorList').appendChild(div);
    }
    function updateSkills() {
        const names = document.querySelectorAll('.sk-name'), vals = document.querySelectorAll('.sk-val');
        let html = '';
        names.forEach((n, i) => {
            html += `<div class="skill-item"><div class="skill-label"><span>${n.value || 'Skill'}</span><span>${vals[i].value}%</span></div>
                <div class="progress-bg"><div class="progress-fill" style="width:${vals[i].value}%"></div></div></div>`;
        });
        document.getElementById('preSkills').innerHTML = html;
    }

    // 初始化
    updateEdu(); updateExp(); updateSkills();
</script>
</body>
</html>
